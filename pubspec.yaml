name: shunya
description: "Shunya – A Minimalist Haptic Meditation & Jaap Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Screen Management
  wakelock_plus: ^1.2.8
  screen_brightness: ^1.0.1

  # Charts
  fl_chart: ^0.70.2

  # Audio
  just_audio: ^0.9.42

  # Connectivity
  connectivity_plus: ^6.1.4

  # Routing
  go_router: ^14.8.1

  # Settings deep-link
  app_settings: ^5.1.1

  # UUID generation
  uuid: ^4.5.1

  # Date formatting
  intl: ^0.20.2

  # Google Sign In
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
